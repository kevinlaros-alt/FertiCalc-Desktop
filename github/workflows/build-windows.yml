name: Build Windows EXE

  on:
    push:
      branches: [main]
    workflow_dispatch:

  jobs:
    build-windows:
      runs-on: windows-latest
      steps:
        - uses: actions/checkout@v4

        - name: Set up Python 3.12
          uses: actions/setup-python@v5
          with:
            python-version: '3.12'

        - name: Install dependencies
          run: |
            python -m pip install --upgrade pip
            pip install customtkinter openpyxl Pillow pyinstaller

        - name: Build EXE
          run: |
            pyinstaller --onefile --windowed --name FertiCalc --add-data "FertiCalc_data.xlsx;." src/main.py

        - name: Upload EXE
          uses: actions/upload-artifact@v4
          with:
            name: FertiCalc-Windows
            path: dist/FertiCalc.exe
